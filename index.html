<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ZP Labels</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <h1>ZP Labels</h1>
  <p>Fill in the fields and generate ZPL for your label printer.</p>

  <form id="label-form">
    <fieldset>
      <legend>Template</legend>
      <label><input type="radio" name="templateType" value="DSS" checked /> DSS</label><br />
      <label><input type="radio" name="templateType" value="Generate DSS Stock Label" /> DSS Stock</label><br />
      <label><input type="radio" name="templateType" value="Standard" /> Standard</label>
    </fieldset>

    <fieldset>
      <legend>Label data</legend>
      <div id="fields"></div>
    </fieldset>

    <p>
      <button type="submit">Generate ZPL</button>
      <button type="button" id="clear-btn">Clear</button>
      <button type="button" id="copy-btn" disabled>Copy ZPL</button>
      <button type="button" id="download-btn" disabled>Download .zpl</button>
      <button type="button" id="print-btn" disabled>Print label</button>
      <button type="button" id="send-zebra-btn" disabled>Send to Zebra</button>
      <button type="button" id="preview-btn">Refresh preview</button>
    </p>
  </form>

  <h2>ZPL</h2>
  <pre id="zpl-output"><code></code></pre>

  <h2>Preview</h2>
  <p id="preview-size" class="note"></p>
  <div id="label-preview">
    <p>Generate ZPL to preview the label.</p>
  </div>
  <p class="note">
    Print label uses the preview image (browser print dialog).
    Send to Zebra sends raw ZPL via Zebra Browser Print (must be running on this computer).
  </p>

  <p id="toast" hidden></p>

  <script src="app.js"></script>
</body>
</html>
